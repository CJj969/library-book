<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位管理 - SeatBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<!-- 管理端导航栏 -->
<nav class="admin-nav">
  <span class="nav-brand">SeatBook</span>
  <div class="nav-links">
    <a href="./admin-reservations.html">预约管理</a>
    <a href="./admin-seats.html" class="active">座位管理</a>
    <a href="./admin-statistics.html">统计页</a>
  </div>
  <div class="nav-right">
    <span class="admin-name">管理员</span>
    <a href="./index.html" class="btn-seat btn-seat-secondary btn-seat-sm">退出</a>
  </div>
</nav>

<div class="admin-layout">
  <div class="page-content-wide">

    <!-- 页面标题 + 新增按钮 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="page-title mb-0">座位管理</h1>
      <button class="btn-seat btn-seat-primary">+ 新增座位</button>
    </div>

    <!-- 座位表格 -->
    <div class="table-responsive">
      <table class="table-seat">
        <thead>
          <tr>
            <th>ID</th>
            <th>座位编号</th>
            <th>区域</th>
            <th>描述</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td><strong>A-01</strong></td>
            <td>2楼A区</td>
            <td>靠窗位置</td>
            <td><span class="status-tag available">空闲</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-seat btn-seat-secondary btn-seat-sm">编辑</button>
                <button class="btn-seat btn-seat-danger btn-seat-sm">删除</button>
                <button class="btn-seat btn-seat-primary btn-seat-sm">状态切换</button>
              </div>
            </td>
          </tr>
          <tr>
            <td>2</td>
            <td><strong>A-02</strong></td>
            <td>2楼A区</td>
            <td>中间位置</td>
            <td><span class="status-tag available">空闲</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-seat btn-seat-secondary btn-seat-sm">编辑</button>
                <button class="btn-seat btn-seat-danger btn-seat-sm">删除</button>
                <button class="btn-seat btn-seat-primary btn-seat-sm">状态切换</button>
              </div>
            </td>
          </tr>
          <tr>
            <td>3</td>
            <td><strong>A-03</strong></td>
            <td>2楼A区</td>
            <td>靠墙位置</td>
            <td><span class="status-tag maintenance">维修中</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-seat btn-seat-secondary btn-seat-sm">编辑</button>
                <button class="btn-seat btn-seat-danger btn-seat-sm">删除</button>
                <button class="btn-seat btn-seat-primary btn-seat-sm">状态切换</button>
              </div>
            </td>
          </tr>
          <tr>
            <td>4</td>
            <td><strong>B-01</strong></td>
            <td>2楼B区</td>
            <td>靠窗位置</td>
            <td><span class="status-tag available">空闲</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-seat btn-seat-secondary btn-seat-sm">编辑</button>
                <button class="btn-seat btn-seat-danger btn-seat-sm">删除</button>
                <button class="btn-seat btn-seat-primary btn-seat-sm">状态切换</button>
              </div>
            </td>
          </tr>
          <tr>
            <td>5</td>
            <td><strong>B-02</strong></td>
            <td>2楼B区</td>
            <td>中间位置</td>
            <td><span class="status-tag available">空闲</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-seat btn-seat-secondary btn-seat-sm">编辑</button>
                <button class="btn-seat btn-seat-danger btn-seat-sm">删除</button>
                <button class="btn-seat btn-seat-primary btn-seat-sm">状态切换</button>
              </div>
            </td>
          </tr>
          <tr>
            <td>6</td>
            <td><strong>B-03</strong></td>
            <td>2楼B区</td>
            <td>靠过道</td>
            <td><span class="status-tag maintenance">维修中</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-seat btn-seat-secondary btn-seat-sm">编辑</button>
                <button class="btn-seat btn-seat-danger btn-seat-sm">删除</button>
                <button class="btn-seat btn-seat-primary btn-seat-sm">状态切换</button>
              </div>
            </td>
          </tr>
          <tr>
            <td>7</td>
            <td><strong>C-01</strong></td>
            <td>3楼A区</td>
            <td>靠窗位置</td>
            <td><span class="status-tag available">空闲</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-seat btn-seat-secondary btn-seat-sm">编辑</button>
                <button class="btn-seat btn-seat-danger btn-seat-sm">删除</button>
                <button class="btn-seat btn-seat-primary btn-seat-sm">状态切换</button>
              </div>
            </td>
          </tr>
          <tr>
            <td>8</td>
            <td><strong>C-02</strong></td>
            <td>3楼A区</td>
            <td>电源位</td>
            <td><span class="status-tag available">空闲</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-seat btn-seat-secondary btn-seat-sm">编辑</button>
                <button class="btn-seat btn-seat-danger btn-seat-sm">删除</button>
                <button class="btn-seat btn-seat-primary btn-seat-sm">状态切换</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <hr class="divider-seat">

    <!-- 空状态示例 -->
    <div class="empty-state">
      <div class="empty-icon">🪑</div>
      <h4>暂无更多座位</h4>
      <p>当前筛选条件下没有更多座位记录</p>
      <button class="btn-seat btn-seat-primary">+ 新增座位</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
