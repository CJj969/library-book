<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据统计 - SeatBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="admin-layout">

    <nav class="admin-nav">
      <span class="nav-brand">SeatBook</span>
      <div class="nav-links">
        <a href="./admin-reservations.html">预约管理</a>
        <a href="./admin-seats.html">座位管理</a>
        <a href="./admin-statistics.html" class="active">统计页</a>
      </div>
      <div class="nav-right">
        <span class="admin-name">管理员</span>
        <a href="./admin-login.html" class="btn-seat btn-seat-secondary btn-seat-sm">退出</a>
      </div>
    </nav>

    <div class="page-content-wide">

      <div class="page-title">数据统计</div>

      <div class="stat-grid-admin">
        <div class="stat-card-admin stat-primary">
          <div class="stat-number">60</div>
          <div class="stat-label">总座位数</div>
        </div>
        <div class="stat-card-admin stat-success">
          <div class="stat-number">186</div>
          <div class="stat-label">总预约数</div>
        </div>
        <div class="stat-card-admin stat-info">
          <div class="stat-number">24</div>
          <div class="stat-label">今日预约</div>
        </div>
        <div class="stat-card-admin stat-warning">
          <div class="stat-number">67%</div>
          <div class="stat-label">座位利用率</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
        <div class="card-seat">
          <div class="card-seat-header">近期预约趋势</div>
          <div style="margin-top:var(--space-md);">
            <div class="trend-row" style="display:flex;align-items:center;margin-bottom:12px;">
              <span style="width:60px;font-size:13px;color:var(--text-secondary);">周一</span>
              <div style="flex:1;height:8px;background:var(--sub-bg);border-radius:4px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:45%;background:var(--primary);border-radius:4px;"></div>
              </div>
              <span style="font-size:13px;font-weight:600;width:30px;text-align:right;">18</span>
            </div>
            <div class="trend-row" style="display:flex;align-items:center;margin-bottom:12px;">
              <span style="width:60px;font-size:13px;color:var(--text-secondary);">周二</span>
              <div style="flex:1;height:8px;background:var(--sub-bg);border-radius:4px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:55%;background:var(--primary);border-radius:4px;"></div>
              </div>
              <span style="font-size:13px;font-weight:600;width:30px;text-align:right;">22</span>
            </div>
            <div class="trend-row" style="display:flex;align-items:center;margin-bottom:12px;">
              <span style="width:60px;font-size:13px;color:var(--text-secondary);">周三</span>
              <div style="flex:1;height:8px;background:var(--sub-bg);border-radius:4px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:60%;background:var(--primary);border-radius:4px;"></div>
              </div>
              <span style="font-size:13px;font-weight:600;width:30px;text-align:right;">24</span>
            </div>
            <div class="trend-row" style="display:flex;align-items:center;margin-bottom:12px;">
              <span style="width:60px;font-size:13px;color:var(--text-secondary);">周四</span>
              <div style="flex:1;height:8px;background:var(--sub-bg);border-radius:4px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:50%;background:var(--primary);border-radius:4px;"></div>
              </div>
              <span style="font-size:13px;font-weight:600;width:30px;text-align:right;">20</span>
            </div>
            <div class="trend-row" style="display:flex;align-items:center;margin-bottom:12px;">
              <span style="width:60px;font-size:13px;color:var(--text-secondary);">周五</span>
              <div style="flex:1;height:8px;background:var(--sub-bg);border-radius:4px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:48%;background:var(--primary);border-radius:4px;"></div>
              </div>
              <span style="font-size:13px;font-weight:600;width:30px;text-align:right;">19</span>
            </div>
            <div class="trend-row" style="display:flex;align-items:center;margin-bottom:12px;">
              <span style="width:60px;font-size:13px;color:var(--text-secondary);">周六</span>
              <div style="flex:1;height:8px;background:var(--sub-bg);border-radius:4px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:38%;background:var(--primary);border-radius:4px;"></div>
              </div>
              <span style="font-size:13px;font-weight:600;width:30px;text-align:right;">15</span>
            </div>
            <div class="trend-row" style="display:flex;align-items:center;">
              <span style="width:60px;font-size:13px;color:var(--text-secondary);">周日</span>
              <div style="flex:1;height:8px;background:var(--sub-bg);border-radius:4px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:42%;background:var(--primary);border-radius:4px;"></div>
              </div>
              <span style="font-size:13px;font-weight:600;width:30px;text-align:right;">17</span>
            </div>
          </div>
        </div>

        <div class="card-seat">
          <div class="card-seat-header">座位状态分布</div>
          <div style="margin-top:var(--space-md);">
            <div style="display:flex;align-items:center;margin-bottom:16px;">
              <span style="width:80px;font-size:13px;color:var(--text-secondary);">可预约</span>
              <div style="flex:1;height:24px;background:var(--sub-bg);border-radius:6px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:65%;background:var(--success);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:white;">42</div>
              </div>
              <span style="font-size:13px;font-weight:600;color:var(--success);width:40px;text-align:right;">42</span>
            </div>
            <div style="display:flex;align-items:center;margin-bottom:16px;">
              <span style="width:80px;font-size:13px;color:var(--text-secondary);">已预约</span>
              <div style="flex:1;height:24px;background:var(--sub-bg);border-radius:6px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:23%;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:white;">14</div>
              </div>
              <span style="font-size:13px;font-weight:600;color:var(--primary);width:40px;text-align:right;">14</span>
            </div>
            <div style="display:flex;align-items:center;">
              <span style="width:80px;font-size:13px;color:var(--text-secondary);">维护中</span>
              <div style="flex:1;height:24px;background:var(--sub-bg);border-radius:6px;margin:0 12px;overflow:hidden;">
                <div style="height:100%;width:7%;background:var(--text-disabled);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:white;">4</div>
              </div>
              <span style="font-size:13px;font-weight:600;color:var(--text-disabled);width:40px;text-align:right;">4</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
