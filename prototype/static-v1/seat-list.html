<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择座位 - SeatBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="phone-frame">

  <!-- 导航栏 -->
  <nav class="mobile-nav">
    <a href="./index.html" class="nav-brand">SeatBook</a>
    <div class="nav-links">
      <a href="./seat-list.html" class="active">查座</a>
      <a href="./my-reservations.html">我的预约</a>
      <select class="account-switch">
        <option>体验账号</option>
        <option>admin</option>
      </select>
    </div>
  </nav>

  <!-- 内容区 -->
  <div class="page-content">

    <!-- 页面标题 -->
    <h1 class="page-title">选择座位</h1>

    <!-- 区域 Tabs -->
    <div class="area-tabs">
      <span class="area-tab active">全部</span>
      <span class="area-tab">2楼A区</span>
      <span class="area-tab">2楼B区</span>
      <span class="area-tab">3楼A区</span>
    </div>

    <!-- 座位网格 -->
    <div class="seat-grid">

      <!-- 可用 -->
      <a href="./seat-detail.html?id=1" class="seat-card available">
        <div class="seat-number">A-01</div>
        <div class="seat-area">2楼A区</div>
        <span class="seat-badge">空闲</span>
      </a>

      <a href="./seat-detail.html?id=2" class="seat-card available">
        <div class="seat-number">A-02</div>
        <div class="seat-area">2楼A区</div>
        <span class="seat-badge">空闲</span>
      </a>

      <!-- 已预约 -->
      <div class="seat-card reserved">
        <div class="seat-number">A-03</div>
        <div class="seat-area">2楼A区</div>
        <span class="seat-badge">已预约</span>
      </div>

      <a href="./seat-detail.html?id=4" class="seat-card available">
        <div class="seat-number">B-01</div>
        <div class="seat-area">2楼B区</div>
        <span class="seat-badge">空闲</span>
      </a>

      <a href="./seat-detail.html?id=5" class="seat-card available">
        <div class="seat-number">B-02</div>
        <div class="seat-area">2楼B区</div>
        <span class="seat-badge">空闲</span>
      </a>

      <div class="seat-card reserved">
        <div class="seat-number">B-03</div>
        <div class="seat-area">2楼B区</div>
        <span class="seat-badge">已预约</span>
      </div>

      <!-- 维修中 -->
      <div class="seat-card maintenance">
        <div class="seat-number">B-04</div>
        <div class="seat-area">2楼B区</div>
        <span class="seat-badge">维修中</span>
      </div>

      <a href="./seat-detail.html?id=8" class="seat-card available">
        <div class="seat-number">B-05</div>
        <div class="seat-area">2楼B区</div>
        <span class="seat-badge">空闲</span>
      </a>

      <a href="./seat-detail.html?id=9" class="seat-card available">
        <div class="seat-number">C-01</div>
        <div class="seat-area">3楼A区</div>
        <span class="seat-badge">空闲</span>
      </a>

      <div class="seat-card reserved">
        <div class="seat-number">C-02</div>
        <div class="seat-area">3楼A区</div>
        <span class="seat-badge">已预约</span>
      </div>

      <a href="./seat-detail.html?id=11" class="seat-card available">
        <div class="seat-number">C-03</div>
        <div class="seat-area">3楼A区</div>
        <span class="seat-badge">空闲</span>
      </a>

      <a href="./seat-detail.html?id=12" class="seat-card available">
        <div class="seat-number">C-04</div>
        <div class="seat-area">3楼A区</div>
        <span class="seat-badge">空闲</span>
      </a>

    </div>

  </div>

  <!-- 底部安全区 -->
  <div class="footer-safe"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
