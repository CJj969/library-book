<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 图书馆座位预约系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:var(--space-lg);">
        <div style="font-size:20px;font-weight:700;margin-bottom:4px;">管理员登录</div>
        <div style="font-size:13px;color:var(--text-secondary);">图书馆座位预约系统</div>
      </div>

      <div class="alert-seat alert-seat-danger" role="alert" style="margin-bottom:var(--space-md);">
        <span>✕ 账号或密码错误</span>
      </div>

      <form action="./admin-reservations.html" method="GET">
        <div class="reserve-form">
          <div class="form-group">
            <label for="username" class="form-label">管理员账号</label>
            <input type="text" class="form-control-seat" id="username" placeholder="请输入管理员账号" value="admin">
          </div>
          <div class="form-group">
            <label for="password" class="form-label">密码</label>
            <input type="password" class="form-control-seat" id="password" placeholder="请输入密码" value="">
          </div>
          <button type="submit" class="btn-seat btn-seat-primary btn-seat-block" style="height:44px;margin-top:var(--space-md);">登 录</button>
        </div>
      </form>

      <div style="text-align:center;margin-top:var(--space-lg);">
        <small style="color:var(--text-secondary);">默认账号: admin / 密码: 123456</small>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
