<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>座位详情 — 图书馆座位预约系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="phone-frame">

  <!-- ======== 顶部导航 ======== -->
  <nav class="mobile-nav">
    <a href="./seat-list.html" class="btn-seat btn-seat-ghost" style="margin-right:var(--space-sm);padding:0;font-size:18px;">
      &#8592;
    </a>
    <div class="nav-brand">座位详情</div>
    <div class="nav-links">
      <select class="account-switch">
        <option>张三</option>
        <option>切换账号</option>
      </select>
    </div>
  </nav>

  <!-- ======== 页面内容 ======== -->
  <div class="page-content">

    <!-- 座位信息卡片 -->
    <div class="card-seat">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:48px;height:48px;border-radius:12px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;">
          A-06
        </div>
        <div style="flex:1;">
          <div style="font-size:18px;font-weight:700;color:var(--text-primary);">A-06 座位</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">2楼A区 · 靠窗，有插座</div>
        </div>
      </div>
    </div>

    <!-- 时段时间轴 -->
    <div class="card-seat">
      <div class="card-seat-header">可选时段</div>
      <div class="timeline">

        <div class="timeline-slot">
          <span class="slot-label">上午</span>
          <div class="slot-bar free"></div>
          <span class="slot-status" style="color:var(--success);">空闲</span>
        </div>

        <div class="timeline-slot">
          <span class="slot-label">下午</span>
          <div class="slot-bar occupied"></div>
          <span class="slot-status" style="color:var(--info);">已预约</span>
        </div>

        <div class="timeline-slot">
          <span class="slot-label">晚上</span>
          <div class="slot-bar free"></div>
          <span class="slot-status" style="color:var(--success);">空闲</span>
        </div>

      </div>
      <div style="display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--text-disabled);">
        <span>08:00 – 12:00</span>
        <span>13:00 – 17:00</span>
        <span>18:00 – 22:00</span>
      </div>
    </div>

    <!-- 预约表单卡片 -->
    <div class="card-seat">
      <div class="card-seat-header">预约座位</div>

      <!-- 冲突错误提示 -->
      <div class="alert-seat alert-seat-danger">
        <span style="font-size:16px;">&#9888;</span>
        <span>该时段已被预约，请选择其他时段</span>
      </div>

      <form class="reserve-form">
        <div class="form-group">
          <label class="form-label" for="reserveDate">选择日期</label>
          <input type="date" id="reserveDate" class="form-control-seat" value="2026-07-14">
        </div>

        <div class="form-group">
          <label class="form-label" for="reservePeriod">选择时段</label>
          <select id="reservePeriod" class="form-control-seat">
            <option value="">请选择时段</option>
            <option value="morning">上午 08:00–12:00</option>
            <option value="afternoon" selected>下午 13:00–17:00</option>
            <option value="evening">晚上 18:00–22:00</option>
          </select>
        </div>

        <button type="submit" class="btn-seat btn-seat-primary btn-seat-block" style="height:44px;font-size:15px;margin-top:4px;">
          确认预约
        </button>
      </form>
    </div>

  </div>

  <!-- 底部安全区 -->
  <div class="footer-safe"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
